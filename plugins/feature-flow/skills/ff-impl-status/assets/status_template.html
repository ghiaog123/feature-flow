<!doctype html>
<html lang="{{LANG}}">
<head>
<meta charset="utf-8" />
<title>{{FEATURE}} — implementation status</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600;700&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
<style>
  :root {
    --bg: #FAFAF9;
    --surface: #FFFFFF;
    --surface-2: #F8FAFC;
    --border: #E2E8F0;
    --border-strong: #CBD5E1;
    --text: #0F172A;
    --text-muted: #64748B;
    --text-soft: #475569;

    --accent: #2563EB;
    --accent-bg: #EFF6FF;
    --success: #16A34A;
    --success-bg: #F0FDF4;
    --warn: #D97706;
    --warn-bg: #FFFBEB;
    --danger: #DC2626;
    --danger-bg: #FEF2F2;

    --shadow-sm: 0 1px 2px rgba(15, 23, 42, 0.04);
    --shadow: 0 1px 3px rgba(15, 23, 42, 0.06), 0 1px 2px rgba(15, 23, 42, 0.04);
    --radius: 10px;
    --radius-sm: 6px;
  }

  * { box-sizing: border-box; }
  html { -webkit-text-size-adjust: 100%; }
  body {
    margin: 0;
    font-family: "IBM Plex Sans", ui-sans-serif, system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    background: var(--bg);
    color: var(--text);
    line-height: 1.55;
    font-size: 14px;
    -webkit-font-smoothing: antialiased;
    -moz-osx-font-smoothing: grayscale;
  }
  .wrap { max-width: 1040px; margin: 0 auto; padding: 40px 24px 96px; }

  header.page { margin-bottom: 28px; }
  h1 { font-size: 26px; line-height: 1.25; margin: 0 0 8px; font-weight: 700; letter-spacing: -0.01em; }
  .sub { color: var(--text-muted); font-size: 13px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap; }
  .sub .dot { width: 3px; height: 3px; border-radius: 50%; background: var(--border-strong); display: inline-block; }

  section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 20px 24px;
    margin-bottom: 16px;
    box-shadow: var(--shadow-sm);
  }
  section h2 {
    font-size: 13px;
    margin: 0 0 14px;
    color: var(--text-muted);
    font-weight: 600;
    text-transform: uppercase;
    letter-spacing: 0.06em;
  }

  table { width: 100%; border-collapse: collapse; font-size: 13.5px; }
  thead th {
    text-align: left;
    padding: 10px 12px;
    color: var(--text-muted);
    font-weight: 600;
    font-size: 12px;
    text-transform: uppercase;
    letter-spacing: 0.04em;
    background: var(--surface-2);
    border-bottom: 1px solid var(--border);
  }
  thead th:first-child { border-top-left-radius: var(--radius-sm); }
  thead th:last-child { border-top-right-radius: var(--radius-sm); }
  tbody td { padding: 11px 12px; border-bottom: 1px solid var(--border); vertical-align: top; color: var(--text); }
  tbody tr:last-child td { border-bottom: 0; }
  tbody tr:hover td { background: var(--surface-2); }

  code, pre {
    font-family: "JetBrains Mono", ui-monospace, "SF Mono", Menlo, Consolas, monospace;
    font-size: 12.5px;
  }
  code {
    background: var(--surface-2);
    padding: 1.5px 6px;
    border-radius: 4px;
    border: 1px solid var(--border);
    color: var(--text);
  }
  pre {
    background: var(--surface-2);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    overflow-x: auto;
    line-height: 1.55;
  }
  pre code { background: transparent; border: 0; padding: 0; }

  ul, ol { margin: 4px 0; padding-left: 22px; }
  li { font-size: 13.5px; margin-bottom: 6px; }

  .tag {
    display: inline-flex;
    align-items: center;
    gap: 5px;
    padding: 2px 9px;
    border-radius: 999px;
    font-size: 11.5px;
    font-weight: 600;
    line-height: 1.6;
    border: 1px solid transparent;
  }
  .tag::before {
    content: "";
    width: 5px;
    height: 5px;
    border-radius: 50%;
    background: currentColor;
    flex: none;
  }
  .t-done { background: var(--success-bg); color: var(--success); border-color: rgba(22, 163, 74, 0.2); }
  .t-prog { background: var(--accent-bg); color: var(--accent); border-color: rgba(37, 99, 235, 0.2); }
  .t-todo { background: var(--surface-2); color: var(--text-muted); border-color: var(--border); }
  .t-warn { background: var(--warn-bg); color: var(--warn); border-color: rgba(217, 119, 6, 0.2); }
  .t-bad  { background: var(--danger-bg); color: var(--danger); border-color: rgba(220, 38, 38, 0.2); }

  .decision {
    border-left: 3px solid var(--accent);
    background: var(--accent-bg);
    padding: 10px 14px;
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    margin-bottom: 12px;
  }
  .decision.compromise { border-left-color: var(--warn); background: var(--warn-bg); }
  .decision.bug { border-left-color: var(--danger); background: var(--danger-bg); }
  .decision h4 { margin: 0 0 4px; font-size: 13.5px; color: var(--text); font-weight: 600; }
  .decision p { margin: 0; font-size: 13px; color: var(--text-soft); }
  .decision .why { color: var(--text); }
  .decision strong { color: var(--text); font-weight: 600; }

  .files { font-size: 12.5px; color: var(--text-soft); }
  .files p { margin: 8px 0 6px; color: var(--text-muted); font-size: 12px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.04em; }
  .files code { display: inline-block; margin: 2px 4px 2px 0; font-size: 12px; }

  a { color: var(--accent); text-decoration: none; }
  a:hover { text-decoration: underline; }

  @media (max-width: 640px) {
    .wrap { padding: 28px 18px 72px; }
    h1 { font-size: 22px; }
    section { padding: 16px 18px; }
  }

  @media (prefers-reduced-motion: reduce) {
    * { transition: none !important; animation: none !important; }
  }
</style>
</head>
<body>
<div class="wrap">
  <header class="page">
    <h1>{{FEATURE}} — Implementation Status</h1>
    <div class="sub">
      <span class="tag t-prog">IN PROGRESS</span>
      <span class="dot"></span>
      <span>started {{DATE}}</span>
    </div>
  </header>

  <section>
    <h2>Tiến độ</h2>
    <table>
      <thead><tr><th style="width:48px;">#</th><th>Bước</th><th style="width:140px;">Trạng thái</th></tr></thead>
      <tbody>
        <!-- <tr><td>1</td><td>...</td><td><span class="tag t-todo">todo</span></td></tr> -->
      </tbody>
    </table>
  </section>

  <section>
    <h2>Decisions (ngoài thiết kế)</h2>
    <!-- <div class="decision"><h4>Title</h4><p class="why"><strong>Why:</strong> ...</p></div> -->
  </section>

  <section>
    <h2>Compromises / điều cần biết</h2>
    <!-- <div class="decision compromise"><h4>Title</h4><p class="why"><strong>Why:</strong> ...</p></div> -->
  </section>

  <section>
    <h2>Bugs caught &amp; fixed</h2>
    <!-- <div class="decision bug"><h4>BUG-1: short title</h4><p class="why"><strong>Fix:</strong> ...</p></div> -->
  </section>

  <section>
    <h2>Files changed / created</h2>
    <div class="files">
      <p>Mới</p>
      <!-- <code>path/to/new_file</code> -->
      <p>Sửa</p>
      <!-- <code>path/to/modified_file</code> -->
    </div>
  </section>

  <section>
    <h2>Rollout checklist</h2>
    <ol>
      <!-- <li>Step ...</li> -->
    </ol>
  </section>

  <section>
    <h2>Smoke check đã chạy</h2>
    <ul>
      <!-- <li><code>command</code> → OK / Fail</li> -->
    </ul>
  </section>
</div>
</body>
</html>
